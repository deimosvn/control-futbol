<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00e5ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Control remoto PWA para robot de fútbol">
  <title>RoboFútbol Control</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Pantalla de carga -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-icon">⚽</div>
      <h1>RoboFútbol</h1>
      <p>Control Remoto</p>
      <div class="loader"></div>
    </div>
  </div>

  <!-- App principal -->
  <div id="app" class="app hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="app-title">⚽ RoboFútbol</span>
      </div>
      <div class="header-right">
        <div class="battery-indicator" id="batteryIndicator" title="Batería del robot">
          <div class="battery-icon">
            <div class="battery-level" id="batteryLevel"></div>
          </div>
          <span id="batteryText">--</span>
        </div>
        <div class="connection-status" id="connectionStatus">
          <span class="status-dot disconnected"></span>
          <span class="status-text">Desconectado</span>
        </div>
        <button class="btn-icon" id="btnSettings" aria-label="Configuración">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Panel de conexión -->
    <div id="connectionPanel" class="connection-panel hidden">
      <div class="panel-overlay" id="panelOverlay"></div>
      <div class="panel-content">
        <h2>Conexión</h2>
        
        <!-- Bluetooth -->
        <div class="conn-option" id="connBluetooth">
          <div class="conn-icon bluetooth">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/>
            </svg>
          </div>
          <div class="conn-info">
            <span class="conn-name">Bluetooth</span>
            <span class="conn-desc" id="btStatus">Web Bluetooth API</span>
          </div>
          <button class="btn-connect" id="btnBluetooth">Conectar</button>
        </div>

        <!-- WiFi -->
        <div class="conn-option" id="connWifi">
          <div class="conn-icon wifi">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
            </svg>
          </div>
          <div class="conn-info">
            <span class="conn-name">WiFi</span>
            <span class="conn-desc" id="wifiStatus">WebSocket</span>
          </div>
          <div class="wifi-config" id="wifiConfig">
            <input type="text" id="wifiIP" placeholder="192.168.4.1" value="192.168.4.1" class="input-field">
            <input type="number" id="wifiPort" placeholder="81" value="81" class="input-field small">
          </div>
          <button class="btn-connect" id="btnWifi">Conectar</button>
        </div>

        <!-- Radio Frecuencia -->
        <div class="conn-option" id="connRF">
          <div class="conn-icon rf">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7.76 16.24C6.67 15.16 6 13.66 6 12s.67-3.16 1.76-4.24l1.42 1.42C8.45 9.9 8 10.9 8 12c0 1.1.45 2.1 1.17 2.83l-1.41 1.41zm8.48 0l-1.42-1.42C15.55 14.1 16 13.1 16 12c0-1.1-.45-2.1-1.17-2.83l1.41-1.41C17.33 8.84 18 10.34 18 12s-.67 3.16-1.76 4.24zM12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM20 12c0 2.21-.9 4.21-2.35 5.65l1.42 1.42C20.88 17.26 22 14.76 22 12s-1.12-5.26-2.93-7.07l-1.42 1.42A7.94 7.94 0 0120 12zM6.35 6.35L4.93 4.93C3.12 6.74 2 9.24 2 12s1.12 5.26 2.93 7.07l1.42-1.42C4.9 16.21 4 14.21 4 12s.9-4.21 2.35-5.65z"/>
            </svg>
          </div>
          <div class="conn-info">
            <span class="conn-name">Radio Frecuencia</span>
            <span class="conn-desc" id="rfStatus">Web Serial API</span>
          </div>
          <div class="rf-config" id="rfConfig">
            <select id="rfBaudRate" class="input-field">
              <option value="9600">9600 baud</option>
              <option value="19200">19200 baud</option>
              <option value="38400">38400 baud</option>
              <option value="57600">57600 baud</option>
              <option value="115200" selected>115200 baud</option>
            </select>
          </div>
          <button class="btn-connect" id="btnRF">Conectar</button>
        </div>

        <button class="btn-close-panel" id="btnClosePanel">Cerrar</button>
      </div>
    </div>

    <!-- Controles principales -->
    <main class="controls">
      <!-- Indicador de velocidad -->
      <div class="speed-section">
        <label class="speed-label">Velocidad: <span id="speedValue">50</span>%</label>
        <input type="range" id="speedSlider" class="speed-slider" min="0" max="100" value="50">
        <div class="speed-presets">
          <button class="speed-btn" data-speed="25">Lento</button>
          <button class="speed-btn active" data-speed="50">Normal</button>
          <button class="speed-btn" data-speed="75">Rápido</button>
          <button class="speed-btn" data-speed="100">Turbo</button>
        </div>
      </div>

      <!-- Área de controles -->
      <div class="controls-area">
        <!-- Joystick izquierdo - Movimiento -->
        <div class="joystick-container" id="joystickMove">
          <div class="joystick-label">Movimiento</div>
          <div class="joystick-zone" id="joystickMoveZone">
            <div class="joystick-base">
              <div class="joystick-stick" id="joystickMoveStick"></div>
            </div>
          </div>
        </div>

        <!-- Botones de acción centrales -->
        <div class="action-buttons">
          <button class="action-btn kick" id="btnKick" data-action="kick">
            <span class="btn-icon-inner">⚽</span>
            <span class="btn-label">Patear</span>
          </button>
          <button class="action-btn pass" id="btnPass" data-action="pass">
            <span class="btn-icon-inner">↗</span>
            <span class="btn-label">Pasar</span>
          </button>
          <button class="action-btn special" id="btnSpecial" data-action="special">
            <span class="btn-icon-inner">⚡</span>
            <span class="btn-label">Especial</span>
          </button>
          <button class="action-btn stop" id="btnStop" data-action="stop">
            <span class="btn-icon-inner">✋</span>
            <span class="btn-label">Parar</span>
          </button>
        </div>

        <!-- Joystick derecho - Rotación -->
        <div class="joystick-container" id="joystickRotate">
          <div class="joystick-label">Rotación</div>
          <div class="joystick-zone" id="joystickRotateZone">
            <div class="joystick-base">
              <div class="joystick-stick" id="joystickRotateStick"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- D-Pad alternativo (se puede activar en configuración) -->
      <div class="dpad-container hidden" id="dpadContainer">
        <div class="dpad">
          <button class="dpad-btn up" id="dpadUp" data-dir="up">▲</button>
          <button class="dpad-btn right" id="dpadRight" data-dir="right">▶</button>
          <button class="dpad-btn down" id="dpadDown" data-dir="down">▼</button>
          <button class="dpad-btn left" id="dpadLeft" data-dir="left">◀</button>
          <div class="dpad-center"></div>
        </div>
      </div>

      <!-- Botones rápidos inferiores -->
      <div class="quick-actions">
        <button class="quick-btn" id="btnEmergency" data-action="emergency">
          🛑 Emergencia
        </button>
        <button class="quick-btn" id="btnCalibrate" data-action="calibrate">
          🔧 Calibrar
        </button>
        <button class="quick-btn" id="btnMode" data-action="mode">
          🔄 Modo
        </button>
      </div>
    </main>

    <!-- Modal de configuración -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h2>Configuración</h2>
        
        <div class="setting-group">
          <h3>Control</h3>
          <label class="setting-item">
            <span>Tipo de control</span>
            <select id="settingControlType" class="input-field">
              <option value="joystick">Joystick Virtual</option>
              <option value="dpad">D-Pad</option>
              <option value="gyro">Giroscopio</option>
            </select>
          </label>
          <label class="setting-item">
            <span>Vibración</span>
            <input type="checkbox" id="settingVibration" checked>
          </label>
          <label class="setting-item">
            <span>Sensibilidad</span>
            <input type="range" id="settingSensitivity" min="1" max="10" value="5">
          </label>
        </div>

        <div class="setting-group">
          <h3>Robot</h3>
          <label class="setting-item">
            <span>Nombre del robot</span>
            <input type="text" id="settingRobotName" class="input-field" placeholder="Mi Robot" value="RoboFútbol-01">
          </label>
          <label class="setting-item">
            <span>Frecuencia de envío (ms)</span>
            <input type="number" id="settingSendRate" class="input-field small" value="50" min="20" max="200">
          </label>
        </div>

        <div class="setting-group">
          <h3>Protocolo</h3>
          <label class="setting-item">
            <span>Formato de datos</span>
            <select id="settingProtocol" class="input-field">
              <option value="json">JSON</option>
              <option value="binary">Binario</option>
              <option value="csv">CSV</option>
            </select>
          </label>
        </div>

        <div class="modal-actions">
          <button class="btn-primary" id="btnSaveSettings">Guardar</button>
          <button class="btn-secondary" id="btnCloseSettings">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Toast de notificaciones -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="js/bluetooth.js"></script>
  <script src="js/wifi.js"></script>
  <script src="js/rf.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
